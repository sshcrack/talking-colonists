name: Bug Report
description: File a bug report for McTalking
title: "[Bug]: "
labels: ["bug"]
assignees: "sshcrack"

body:
  - type: markdown
    attributes:
      value: |
        ## McTalking Bug Report
        Thanks for taking the time to fill out this bug report!
        Please provide as much information as possible to help us identify and fix the issue.

  - type: dropdown
    id: minecraft-version
    attributes:
      label: Minecraft Version
      description: Which version of Minecraft are you using?
      options:
        - 1.21.1
        - 1.20.1
    validations:
      required: true

  - type: dropdown
    id: modloader
    attributes:
      label: Mod Loader
      description: Which mod loader are you using?
      options:
        - Forge
        - NeoForge
    validations:
      required: true

  - type: input
    id: mc-talking-version
    attributes:
      label: McTalking Version
      description: What version of McTalking are you using?
      placeholder: "e.g. 1.2.2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in detail. What did you expect to happen and what actually happened?
      placeholder: "Describe the issue here..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start Minecraft with the mod installed
        2. Do this...
        3. Then that...
        4. See the error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Minecraft Logs
      description: Please attach your Minecraft logs here. These can be found in the `logs` folder.
      placeholder: "Drag and drop your latest.log or debug.log file here, or paste the contents"
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Any other information that might be helpful (screenshots, videos, etc.)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our code of conduct
      options:
        - label: I have searched for similar issues before creating this one
          required: true
        - label: I have provided all the required information to help identify the issue
          required: true
