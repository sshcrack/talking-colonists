name: reusable-build
on:
  workflow_call:
    inputs:
      release:
        description: "Whether this is a release build"
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: "Name of the uploaded build artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    env:
      MOD_IS_RELEASE: ${{ inputs.release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew buildAndCollect --no-daemon

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/

  mixin-smoke-verification:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify mixin smoke test was run locally
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No base commit to compare against — skipping mixin detection"
            exit 0
          fi
          mixin_changed=$(git diff --name-only "$base"..HEAD -- 'src/main/java/me/sshcrack/mc_talking/mixin/' 'src/main/resources/*.mixins.json' 2>/dev/null || true)
          if [ -z "$mixin_changed" ]; then
            echo "No mixin changes detected — smoke test not required"
            exit 0
          fi

          if [ ! -f .mixin-smoke-verified ]; then
            echo "ERROR: Mixin smoke test not run locally."
            echo "Run 'bash scripts/test-mixin-smoke.sh' and commit .mixin-smoke-verified."
            exit 1
          fi
          expected=$(git rev-parse HEAD)
          actual=$(tr -d ' \n' < .mixin-smoke-verified)
          if [ "$expected" != "$actual" ]; then
            echo "ERROR: Mixin smoke test result is stale (commit mismatch)."
            echo "  expected: $expected (HEAD)"
            echo "  actual:   $actual (.mixin-smoke-verified)"
            echo "Re-run 'bash scripts/test-mixin-smoke.sh' locally."
            exit 1
          fi
          echo "✓ Mixin smoke test verified for commit $expected"
