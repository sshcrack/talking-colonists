name: build
on: [ push, pull_request ]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build_reusable.yml

  pr-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Generate PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifact_id=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | select(.name=="build-artifacts") | .id' | head -n1)
          artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          if [ -n "$artifact_id" ]; then
            artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$artifact_id"
          fi

          echo "## Build Artifacts" > comment.md
          echo "" >> comment.md
          echo "These JARs were built from this PR:" >> comment.md
          echo "" >> comment.md
          echo "| File | Size |" >> comment.md
          echo "|------|------|" >> comment.md
          find build-artifacts -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -type f | sort | while read jar; do
            name=$(basename "$jar")
            size=$(du -h "$jar" | cut -f1)
            echo "| [\`$name\`]($artifact_url) | $size |" >> comment.md
          done
          echo "" >> comment.md
          echo "Download from the [GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)." >> comment.md
          cat comment.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file comment.md

  mixin-smoke-test:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'microsoft'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install Xvfb + Mesa for Minecraft rendering
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgl1-mesa-dri libgl1 libglx-mesa0 \
            libxrandr2 libxinerama1 libxcursor1 libxi6

      - name: Cache CI world
        uses: actions/cache@v4
        with:
          path: /tmp/CI_WORLD.zip
          key: ci-world

      - name: Download CI world (if not cached)
        run: |
          if [ ! -f /tmp/CI_WORLD.zip ]; then
            curl -L -o /tmp/CI_WORLD.zip "http://mc.sshcrack.me/CI_WORLD.zip"
          fi

      - name: Extract CI world for each version
        run: |
          grep 'match("[0-9]' settings.gradle.kts | sed 's/.*match("\(.*\)", "\(.*\)").*/\1-\2/' | while read -r version; do
            saves_dir="versions/$version/run/saves/CI_World"
            mkdir -p "$saves_dir"
            unzip -q -o /tmp/CI_WORLD.zip -d "$saves_dir"
          done

      - name: Start Xvfb and run mixin smoke test
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          XVFB_PID=$!
          sleep 1
          bash scripts/test-mixin-smoke.sh
          EXIT_CODE=$?
          kill $XVFB_PID 2>/dev/null || true
          exit $EXIT_CODE
