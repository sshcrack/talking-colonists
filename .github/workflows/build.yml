name: build
on: [ push, pull_request ]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build_reusable.yml

  pr-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Generate PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifact_id=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | select(.name=="build-artifacts") | .id' | head -n1)
          artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          if [ -n "$artifact_id" ]; then
            artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$artifact_id"
          fi

          echo "## Build Artifacts" > comment.md
          echo "" >> comment.md
          echo "These JARs were built from this PR:" >> comment.md
          echo "" >> comment.md
          echo "| File | Size |" >> comment.md
          echo "|------|------|" >> comment.md
          find build-artifacts -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -type f | sort | while read jar; do
            name=$(basename "$jar")
            size=$(du -h "$jar" | cut -f1)
            echo "| [\`$name\`]($artifact_url) | $size |" >> comment.md
          done
          echo "" >> comment.md
          echo "Download from the [GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)." >> comment.md
          cat comment.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file comment.md

  mixin-smoke-verification:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify mixin smoke test was run locally
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No base commit to compare against — skipping mixin detection"
            exit 0
          fi
          mixin_changed=$(git diff --name-only "$base"..HEAD -- 'src/main/java/me/sshcrack/mc_talking/mixin/' 'src/main/resources/*.mixins.json' 2>/dev/null || true)
          if [ -z "$mixin_changed" ]; then
            echo "No mixin changes detected — smoke test not required"
            exit 0
          fi

          if [ ! -f .mixin-smoke-verified ]; then
            echo "ERROR: Mixin smoke test not run locally."
            echo "Run 'bash scripts/test-mixin-smoke.sh' and commit .mixin-smoke-verified."
            exit 1
          fi
          expected=$(git rev-parse HEAD)
          actual=$(tr -d ' \n' < .mixin-smoke-verified)
          if [ "$expected" != "$actual" ]; then
            echo "ERROR: Mixin smoke test result is stale (commit mismatch)."
            echo "  expected: $expected (HEAD)"
            echo "  actual:   $actual (.mixin-smoke-verified)"
            echo "Re-run 'bash scripts/test-mixin-smoke.sh' locally."
            exit 1
          fi
          echo "✓ Mixin smoke test verified for commit $expected"
