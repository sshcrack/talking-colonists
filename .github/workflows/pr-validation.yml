name: Pull Request Validation

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Name Format
        id: check-branch
        run: |
          HEAD_REF="${{ github.head_ref }}"
          echo "Branch name: $HEAD_REF"
          
          # Check for NeoForge with version pattern (neoforge-X.Y.Z-*)
          if [[ "$HEAD_REF" =~ ^neoforge-([0-9]+\.[0-9]+\.[0-9]+)(-.*)?$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Valid NeoForge branch prefix detected with version $VERSION"
            echo "is_valid=true" >> $GITHUB_OUTPUT
            echo "platform=neoforge-$VERSION" >> $GITHUB_OUTPUT
            echo "type=neoforge" >> $GITHUB_OUTPUT
          
          # Check for generic NeoForge pattern (neoforge-*)
          elif [[ "$HEAD_REF" == neoforge-* ]]; then
            echo "Valid NeoForge branch prefix detected (default version 1.21.1)"
            echo "is_valid=true" >> $GITHUB_OUTPUT
            echo "platform=neoforge-1.21.1" >> $GITHUB_OUTPUT
            echo "type=neoforge" >> $GITHUB_OUTPUT
          
          # Check for Forge with version pattern (forge-X.Y.Z-*)
          elif [[ "$HEAD_REF" =~ ^forge-([0-9]+\.[0-9]+\.[0-9]+)(-.*)?$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Valid Forge branch prefix detected with version $VERSION"
            echo "is_valid=true" >> $GITHUB_OUTPUT
            echo "platform=forge-$VERSION" >> $GITHUB_OUTPUT
            echo "type=forge" >> $GITHUB_OUTPUT
          
          # Check for generic Forge pattern (forge-*)
          elif [[ "$HEAD_REF" == forge-* ]]; then
            echo "Valid Forge branch prefix detected (default version 1.20.1)"
            echo "is_valid=true" >> $GITHUB_OUTPUT
            echo "platform=forge-1.20.1" >> $GITHUB_OUTPUT
            echo "type=forge" >> $GITHUB_OUTPUT
          
          # Invalid branch name
          else
            echo "Invalid branch prefix. Branch must start with either 'neoforge-' or 'forge-'"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            echo "platform=unknown" >> $GITHUB_OUTPUT
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Close Pull Request
        if: steps.check-branch.outputs.is_valid == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Pull Request Validation Failed** ⚠️\n\nThis PR has been automatically closed because it does not follow the required branch naming convention.\n\n**Required Format:**\n- For NeoForge: Branch name must start with `neoforge-` or `neoforge-VERSION-` (e.g., `neoforge-1.21.1-feature`)\n- For Forge: Branch name must start with `forge-` or `forge-VERSION-` (e.g., `forge-1.20.1-bugfix`)\n\nPlease create a new PR with a properly named branch.'
            });
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });

      - name: Add Platform Label
        if: steps.check-branch.outputs.is_valid == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const platform = '${{ steps.check-branch.outputs.platform }}';
            const platformType = '${{ steps.check-branch.outputs.type }}';
            
            try {
              // Try to add the label (this will work if the label already exists)
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [platformType]
              });
              console.log(`Successfully added label: ${platformType}`);
            } catch (error) {
              console.log(`Unable to add label ${platformType}: ${error.message}`);
              // We don't try to create labels anymore due to permission limitations
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Validation Passed**\n\nThis PR has been identified as targeting the **${platform}** platform.`
            });
