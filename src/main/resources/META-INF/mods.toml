modLoader = "javafml" #mandatory
loaderVersion = "*"
license = "${license}"

[[mods]] #mandatory
modId = "${id}" #mandatory
version = "${version}" #mandatory
displayName = "${name}" #mandatory
authors = "${authors}" #optional
description = '''${description}'''

[[dependencies.${ id }]] #optional
modId = "forge" #mandatory
mandatory = true #mandatory
versionRange = "*"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "minecraft"
mandatory = true
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "voicechat"
mandatory = true
versionRange = "[${voicechat_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "minecolonies"
mandatory = true
versionRange = "[${minecolonies_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "gemini_live_lib"
mandatory = true
versionRange = "[${gemini_live_lib_version},)"
ordering = "BEFORE"
side = "BOTH"
